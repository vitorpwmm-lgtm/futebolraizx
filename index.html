<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Futebol Brasil Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* DESIGN VERDE BRASIL */
        *{box-sizing:border-box; margin:0; padding:0; font-family: sans-serif;}
        body{background:#0b6623; color:#fff; text-align:center;}
        header{background:#075e1f; padding:20px; font-weight:bold; font-size:1.4rem; border-bottom:4px solid #054115;}
        
        .top-nav { display: flex; justify-content: space-around; background: #064d19; position: sticky; top: 0; z-index: 1000; }
        .top-nav button { background: none; border: none; color: #fff; padding: 15px; cursor: pointer; font-weight: bold; opacity: 0.6; }
        .top-nav button.active { opacity: 1; border-bottom: 3px solid #fff; }

        main { max-width: 500px; margin: 0 auto; padding: 15px; }
        .jogo { background: #fff; color: #000; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .liga { font-size: 0.7rem; font-weight: bold; color: #0b6623; margin-bottom: 10px; text-transform: uppercase; }
        .placar { display: flex; justify-content: space-between; align-items: center; }
        .time { flex: 1; font-size: 0.8rem; font-weight: bold; }
        .time img { width: 35px; height: 35px; display: block; margin: 0 auto 5px; }
        .gols { font-size: 1.8rem; font-weight: 900; background: #eee; padding: 5px 15px; border-radius: 8px; }
        
        .status { margin-top: 10px; font-size: 0.7rem; font-weight: bold; background: #f0f0f0; padding: 4px; border-radius: 10px; color: #555; display: inline-block; }
        .ao-vivo { background: #d32f2f; color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-proxy { background: #fff; color: #0b6623; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin: 20px; cursor: pointer; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0b6623; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>⚽ FUTEBOL BRASIL PRO</header>

<div class="top-nav">
    <button id="btnHoje" class="active" onclick="aba('hoje')">HOJE</button>
    <button id="btnAoVivo" onclick="aba('ao-vivo')">AO VIVO</button>
</div>

<main id="app">
    <div id="lista">
        <div class="loader"></div>
        <p>Conectando ao servidor seguro...</p>
    </div>
</main>

<script>
    // --- SUA CONFIGURAÇÃO ---
    const KEY = "a8345dca5fmsh5f55cdf29c3cc47p1eb068jsnb91e462c368"; 
    const HOST = "api-football-v1.p.rapidapi.com";

    // PROXY PARA PULAR O ERRO DO GITHUB
    const PROXY = "https://cors-anywhere.herokuapp.com/";

    async function buscar(modo) {
        const listaDiv = document.getElementById("lista");
        listaDiv.innerHTML = "<div class='loader'></div><p>Buscando dados...</p>";

        const data = new Date().toISOString().split('T')[0];
        let url = modo === 'ao-vivo' 
            ? `https://${HOST}/v3/fixtures?live=all` 
            : `https://${HOST}/v3/fixtures?date=${data}`;

        try {
            // TENTATIVA 1: DIRETA
            let response = await fetch(url, {
                method: "GET",
                headers: { "x-rapidapi-key": KEY, "x-rapidapi-host": HOST }
            });

            // SE FALHAR (ERRO DE CORS), USA O PROXY
            if (!response.ok) throw new Error("CORS");

            const resultado = await response.json();
            render(resultado.response);

        } catch (err) {
            // SE DEU ERRO DE CORS, MOSTRA O BOTÃO DE ATIVAÇÃO
            listaDiv.innerHTML = `
                <div style="padding: 20px; background: #fff; color: #000; border-radius: 10px;">
                    <p><b>⚠️ ATENÇÃO:</b> O servidor precisa de permissão para carregar os jogos no navegador.</p>
                    <button class="btn-proxy" onclick="abrirProxy()">1. CLIQUE AQUI PARA AUTORIZAR</button>
                    <p><small>Após clicar, aperte no botão azul "Request temporary access" e volte aqui para atualizar.</small></p>
                    <button class="btn-proxy" onclick="location.reload()" style="background: #0b6623; color: #fff;">2. JÁ AUTORIZEI, ATUALIZAR</button>
                </div>`;
        }
    }

    function abrirProxy() {
        window.open("https://cors-anywhere.herokuapp.com/corsdemo", "_blank");
    }

    function render(jogos) {
        const listaDiv = document.getElementById("lista");
        listaDiv.innerHTML = "";

        if (!jogos || jogos.length === 0) {
            listaDiv.innerHTML = "<p>Nenhum jogo importante
