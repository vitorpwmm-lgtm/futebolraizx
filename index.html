<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Futebol Brasil Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* DESIGN PREMIUM PARA PLAY STORE */
        *{box-sizing:border-box; margin:0; padding:0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
        body{background:#0b6623; color:#fff; overflow-x:hidden; padding-bottom: 30px;}
        header{background:#075e1f; padding:25px; text-align:center; font-weight:bold; font-size:1.5rem; border-bottom:4px solid #054115; box-shadow:0 4px 15px rgba(0,0,0,0.4);}
        
        .top-nav { display: flex; justify-content: space-around; background: #064d19; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .top-nav button { background: none; border: none; color: #fff; font-size: 11px; cursor: pointer; padding: 18px; opacity: 0.6; transition: 0.3s; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .top-nav button.active { opacity: 1; border-bottom: 4px solid #fff; }

        main { max-width: 550px; margin: 0 auto; padding: 15px; min-height: 85vh; }
        input { width: 100%; padding: 15px 25px; border-radius: 35px; border: none; outline: none; color: #333; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        
        .jogo { background: #fff; color: #000; border-radius: 20px; padding: 20px; margin-bottom: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .liga { text-align: center; font-size: 0.7rem; font-weight: 800; margin-bottom: 12px; color: #0b6623; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .placar-box { display: flex; justify-content: space-between; align-items: center; }
        .time { flex: 1; text-align: center; font-weight: 700; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; }
        .time img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; background: #fcfcfc; border-radius: 50%; padding: 4px; }
        .resultado { flex: 0.5; text-align: center; font-size: 1.8rem; font-weight: 900; background: #1a1a1a; border-radius: 12px; padding: 10px 0; color: #fff; margin: 0 12px; min-width: 70px; }
        
        .status { text-align: center; margin-top: 15px; font-size: 0.7rem; color: #555; font-weight: bold; text-transform: uppercase; background: #f0f0f0; padding: 5px 15px; border-radius: 20px; display: inline-block; position: relative; left: 50%; transform: translateX(-50%); }
        .ao-vivo { color: #fff; background: #e63946; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .info-panel { text-align: center; padding: 40px 20px; font-size: 1rem; color: #fff; }
        .erro-alerta { background: #fff; color: #d32f2f; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; font-size: 0.9rem; }
        .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>⚽ FUTEBOL BRASIL PRO</header>

<div class="top-nav">
    <button id="btnOntem" onclick="mudarAba('ontem')">⏪ ONTEM</button>
    <button id="btnHoje" class="active" onclick="mudarAba('hoje')">📅 HOJE</button>
    <button id="btnAoVivo" onclick="mudarAba('ao-vivo')">🔴 AO VIVO</button>
</div>

<main>
    <input type="text" id="campoBusca" placeholder="🔎 Filtrar time ou campeonato..." onkeyup="filtrar()">
    <div id="listaJogos">
        <div class="info-panel">
            <div class="loader"></div>
            <p>Conectando ao RapidAPI...</p>
        </div>
    </div>
</main>

<script>
    // --- SUA CONFIGURAÇÃO (COLOQUE SUA CHAVE AQUI) ---
    const MINHA_KEY = "a8345dca5fmsh5f55cdf29c3cc47p1eb068jsnb91e462c368"; 
    const MEU_HOST = "api-football-v1.p.rapidapi.com";

    let jogosCache = [];

    // Função que prioriza Brasil, mas aceita tudo se não houver Brasil
    function processarLista(lista) {
        if (!lista || lista.length === 0) return [];
        let prioritarios = lista.filter(j => {
            const p = (j.league.country || "").toLowerCase();
            const l = (j.league.name || "").toLowerCase();
            return p === "brazil" || l.includes("libertadores") || l.includes("champions") || l.includes("la liga") || l.includes("premier");
        });
        return prioritarios.length > 0 ? prioritarios : lista.slice(0, 40);
    }

    async function buscar(modo) {
        const container = document.getElementById("listaJogos");
        container.innerHTML = "<div class='info-panel'><div class='loader'></div><p>Buscando dados globais...</p></div>";

        const d = new Date();
        if(modo === 'ontem') d.setDate(d.getDate() - 1);
        const dataFormatada = d.toISOString().split('T')[0];

        // URL DIRETA PARA O RAPIDAPI
        let urlAPI = modo === 'ao-vivo' 
            ? `https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all`
            : `https://api-football-v1.p.rapidapi.com/v3/fixtures?date=${dataFormatada}`;

        try {
            const response = await fetch(urlAPI, {
                method: "GET",
                headers: {
                    "x-rapidapi-key": MINHA_KEY,
                    "x-rapidapi-host": MEU_HOST
                }
            });

            if (!response.ok) {
                throw new Error("Erro de Autenticação");
            }

            const data = await response.json();
            console.log("Sucesso:", data);

            jogosCache = processarLista(data.response || []);
            render(jogosCache);

        } catch (err) {
            console.error(err);
            // MENSAGEM EXPLICATIVA PARA O NAVEGADOR
            container.innerHTML = `
                <div class='info-panel'>
                    <div class='erro-alerta'>
                        ⚠️ BLOQUEIO DE SEGURANÇA (CORS)<br><br>
                        O seu navegador bloqueou a conexão direta com a API.<br><br>
                        PARA FUNCIONAR AGORA:<br>
                        1. Suba este código para o <b>GitHub Pages</b>.<br>
                        2. Ou instale a extensão <b>"Allow CORS"</b> no seu Chrome.<br><br>
                        <small>Nota: No Aplicativo (Android), este erro não acontece e os jogos aparecerão automaticamente.</small>
                    </div>
                </div>`;
        }
    }

    function render(lista) {
        const container = document.getElementById("listaJogos");
        container.innerHTML = "";

        if (lista.length === 0) {
            container.innerHTML = "<div class='info-panel'>Nenhum jogo disponível no momento nesta categoria.</div>";
            return;
        }

        lista.forEach(j => {
            const st = j.fixture.status.short;
            const vivo = ["1H", "2H", "HT", "ET", "P"].includes(st);
            
            const card = document.createElement("div");
            card.className = "jogo";
            card.innerHTML = `
                <div class="liga">🏆 ${j.league.name} (${j.league.country})</div>
                <div class="placar-box">
                    <div class="time">
                        <img src="${j.teams.home.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                        <span>${j.teams.home.name}</span>
                    </div>
                    <div class="resultado">${j.goals.home ?? 0} : ${j.goals.away ?? 0}</div>
                    <div class="time">
                        <img src="${j.teams.away.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                        <span>${j.teams.away.name}</span>
                    </div>
                </div>
                <div class="status ${vivo ? 'ao-vivo' : ''}">
                    ${vivo ? '🔴 AO VIVO ' + (j.fixture.status.elapsed || '') + "'" : j.fixture.status.long}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function mudarAba(m) {
        document.querySelectorAll(".top-nav button").forEach(b => b.classList.remove("active"));
        if(m === 'hoje') document.getElementById("btnHoje").classList.add("active");
        if(m === 'ao-vivo') document.getElementById("btnAoVivo").classList.add("active");
        if(m === 'ontem') document.getElementById("btnOntem").classList.add("active");
        buscar(m);
    }

    function filtrar() {
        const termo = document.getElementById("campoBusca").value.toLowerCase();
        const filtrados = jogosCache.filter(j => 
            j.teams.home.name.toLowerCase().includes(termo) || 
            j.teams.away.name.toLowerCase().includes(termo) ||
            j.league.name.toLowerCase().includes(termo)
        );
        render(filtrados);
    }

    window.onload = () => buscar('hoje');
</script>
</body>
</html>
