<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>⚽ Futebol Só Placar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0b6623;color:#fff}
header{background:#075e1f;padding:15px;text-align:center;font-weight:bold}
.top-nav{display:flex;justify-content:space-around;background:#064d19;padding:10px 0;position:sticky;top:0}
.top-nav button{background:none;border:none;color:#fff;font-size:14px;cursor:pointer}
.top-nav button.active{font-weight:bold;text-decoration:underline}
main{max-width:480px;margin:0 auto;padding:10px}
input{width:100%;padding:8px;margin-bottom:8px;border-radius:8px;border:none}

.jogo{background:#fff;color:#000;border-radius:12px;padding:12px;margin-bottom:12px}
.liga{text-align:center;font-weight:bold;margin-bottom:6px;color:#075e1f}
.info{text-align:center;font-size:12px;margin-bottom:6px;color:#444}
.escudos{display:flex;justify-content:space-between;align-items:center}
.time{width:35%;text-align:center}
.time img{width:40px}
.placar{width:30%;text-align:center;font-size:22px;font-weight:bold}
.status{text-align:center;margin-top:6px;font-weight:bold}
.ao-vivo{color:red;animation:piscar 1s infinite}
@keyframes piscar{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
</style>
</head>

<body>

<header>⚽ Futebol em Tempo Real</header>

<div class="top-nav">
<button class="active" onclick="carregarHoje(event)">📅 Hoje</button>
<button onclick="carregarAoVivo(event)">🔴 Ao Vivo</button>
<button onclick="carregarProximos(event)">⏭ Próximos</button>
</div>

<main>
<input type="text" id="buscaTime" placeholder="🔎 Buscar time..." oninput="filtrarPorTime()">
<div id="jogos">⏳ Carregando...</div>
</main>

<script>
const API_KEY="83657bacfc403e56760917c419b578e6";
const jogosDiv=document.getElementById("jogos");
let jogosAtuais=[];

// 🔥 FILTRO COMPLETO AUTOMÁTICO
function filtrarLigas(lista){
return lista.filter(jogo => {

const nome = jogo.league.name.toLowerCase();
const pais = jogo.league.country.toLowerCase();

return (

// 🇧🇷 BRASIL
(pais === "brazil") ||

nome.includes("serie a") ||
nome.includes("serie b") ||
nome.includes("serie c") ||
nome.includes("serie d") ||

nome.includes("paulista") ||
nome.includes("carioca") ||
nome.includes("mineiro") ||
nome.includes("gaúcho") ||
nome.includes("gaucho") ||
nome.includes("paraense") ||

 // 🌎 AMÉRICA DO SUL
nome.includes("libertadores") ||
nome.includes("sudamericana") ||
nome.includes("sul-americana") ||

 // 🌍 EUROPA
nome.includes("champions") ||
nome.includes("premier league") ||
nome.includes("la liga")

);
});
}

// 🇧🇷 DATA NO FUSO DO BRASIL
function dataBrasil(offset=0){
const hoje=new Date();
const brasil=new Date(hoje.toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
brasil.setDate(brasil.getDate()+offset);
const ano=brasil.getFullYear();
const mes=String(brasil.getMonth()+1).padStart(2,"0");
const dia=String(brasil.getDate()).padStart(2,"0");
return `${ano}-${mes}-${dia}`;
}

function ativarBotao(btn){
document.querySelectorAll(".top-nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function mostrarJogos(lista){
jogosDiv.innerHTML="";
if(lista.length===0){
jogosDiv.innerHTML="Nenhum jogo encontrado.";
return;
}

lista.forEach(jogo=>{
const status=jogo.fixture.status.short;
const aoVivo=["1H","2H","HT","ET","P","BT"].includes(status);

const div=document.createElement("div");
div.className="jogo";
div.innerHTML=`
<div class="liga">🏆 ${jogo.league.name}</div>
<div class="info">
📅 ${new Date(jogo.fixture.date).toLocaleDateString("pt-BR")} • 
🕒 ${new Date(jogo.fixture.date).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}
</div>

<div class="escudos">
<div class="time">
<img src="${jogo.teams.home.logo}">
<div>${jogo.teams.home.name}</div>
</div>

<div class="placar">
${jogo.goals.home ?? "-"} : ${jogo.goals.away ?? "-"}
</div>

<div class="time">
<img src="${jogo.teams.away.logo}">
<div>${jogo.teams.away.name}</div>
</div>
</div>

<div class="status ${aoVivo?"ao-vivo":""}">
${aoVivo?"🔴 AO VIVO":jogo.fixture.status.long}
</div>
`;
jogosDiv.appendChild(div);
});
}

function filtrarPorTime(){
const termo=document.getElementById("buscaTime").value.toLowerCase();
mostrarJogos(jogosAtuais.filter(j=>
j.teams.home.name.toLowerCase().includes(termo)||
j.teams.away.name.toLowerCase().includes(termo)
));
}

function carregarHoje(e){
ativarBotao(e.target);
jogosDiv.innerHTML="⏳ Carregando...";
fetch(`https://v3.football.api-sports.io/fixtures?date=${dataBrasil()}`,{
headers:{"x-apisports-key":API_KEY}
})
.then(r=>r.json())
.then(d=>{
jogosAtuais=filtrarLigas(d.response||[]);
mostrarJogos(jogosAtuais);
});
}

function carregarAoVivo(e){
ativarBotao(e.target);
jogosDiv.innerHTML="⏳ Carregando...";
fetch("https://v3.football.api-sports.io/fixtures?live=all",{
headers:{"x-apisports-key":API_KEY}
})
.then(r=>r.json())
.then(d=>{
jogosAtuais=filtrarLigas(d.response||[]);
mostrarJogos(jogosAtuais);
});
}

function carregarProximos(e){
ativarBotao(e.target);
jogosDiv.innerHTML="⏳ Carregando...";
fetch(`https://v3.football.api-sports.io/fixtures?date=${dataBrasil(1)}`,{
headers:{"x-apisports-key":API_KEY}
})
.then(r=>r.json())
.then(d=>{
jogosAtuais=filtrarLigas(d.response||[])
.filter(j=>j.fixture.status.short==="NS");
mostrarJogos(jogosAtuais);
});
}

carregarHoje({target:document.querySelector(".top-nav button")});
</script>

</body>
</html>
