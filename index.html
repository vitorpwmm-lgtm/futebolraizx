<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Futebol Raiz X</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ESTILO TIPO GLOBO ESPORTE (GE) */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f0f0f0; margin: 0; color: #333; }
        header { background: #06aa48; color: white; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom: 4px solid #048a3a; }
        .nav { display: flex; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #666; }
        .nav button.active { color: #06aa48; border-bottom: 3px solid #06aa48; }
        
        .container { max-width: 600px; margin: 10px auto; padding: 10px; }
        .jogo-card { background: white; border-radius: 8px; margin-bottom: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #06aa48; }
        .liga-nome { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        .placar-row { display: flex; align-items: center; justify-content: space-between; }
        .time { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 14px; font-weight: bold; text-align: center; }
        .time img { width: 40px; height: 40px; margin-bottom: 5px; object-fit: contain; }
        .score { font-size: 24px; font-weight: 900; color: #222; padding: 0 15px; }
        .status-box { text-align: center; margin-top: 10px; font-size: 12px; font-weight: bold; padding: 4px; border-radius: 4px; background: #f9f9f9; color: #777; }
        .ao-vivo { color: #d32f2f; background: #fff1f1; border: 1px solid #ffcccc; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06aa48; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .erro { padding: 20px; text-align: center; color: #666; }
    </style>
</head>
<body>

<header>FUTEBOL RAIZ X</header>

<div class="nav">
    <button id="btnHoje" class="active" onclick="trocarAba('hoje')">HOJE</button>
    <button id="btnAoVivo" onclick="trocarAba('ao-vivo')">AO VIVO</button>
</div>

<div class="container" id="lista">
    <div class="loader"></div>
</div>

<script>
    const API_KEY = "a8345dca5fmsh5f55cdf29c3cc47p1eb068jsnb91e462c368"; 
    const API_HOST = "api-football-v1.p.rapidapi.com";

    // Dicionário simples para nomes em Português (Igual ao GE)
    const traduzir = (nome) => {
        const nomes = {
            "Brazil": "Brasil", "Paulista A1": "Paulistão", "Carioca - Serie A": "Carioca",
            "CR Flamengo": "Flamengo", "Sao Paulo": "São Paulo", "Palmeiras": "Palmeiras",
            "Corinthians": "Corinthians", "Atletico-MG": "Atlético-MG"
        };
        return nomes[nome] || nome;
    };

    async function carregar(modo) {
        const lista = document.getElementById("lista");
        lista.innerHTML = '<div class="loader"></div>';

        const dataIso = new Date().toISOString().split('T')[0];
        const urlBase = modo === 'ao-vivo' 
            ? `https://${API_HOST}/v3/fixtures?live=all` 
            : `https://${API_HOST}/v3/fixtures?date=${dataIso}`;

        // USANDO PROXY QUE FUNCIONA NO GITHUB PAGES
        const urlFinal = `https://api.allorigins.win/get?url=${encodeURIComponent(urlBase)}`;

        try {
            const res = await fetch(urlFinal);
            const jsonProxy = await res.json();
            const dados = JSON.parse(jsonProxy.contents);

            if (!dados.response || dados.response.length === 0) {
                lista.innerHTML = '<div class="erro">Nenhum jogo importante encontrado agora.</div>';
                return;
            }

            renderizar(dados.response);
        } catch (e) {
            lista.innerHTML = '<div class="erro">Erro ao conectar com o servidor. Tente atualizar a página.</div>';
        }
    }

    function renderizar(jogos) {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        // Filtra para dar prioridade ao Brasil (Igual ao GE)
        let filtrados = jogos.filter(j => j.league.country === "Brazil" || j.league.name.includes("Champions") || j.league.name.includes("Libertadores"));
        
        // Se estiver de madrugada e não tiver jogo no Brasil, mostra os principais mundiais
        if (filtrados.length === 0) filtrados = jogos.slice(0, 15);

        filtrados.forEach(j => {
            const vivo = ["1H","2H","HT","ET","P"].includes(j.fixture.status.short);
            const card = document.createElement("div");
            card.className = "jogo-card";
            card.innerHTML = `
                <div class="liga-nome">🏆 ${traduzir(j.league.name)} - ${traduzir(j.league.country)}</div>
                <div class="placar-row">
                    <div class="time"><img src="${j.teams.home.logo}">${traduzir(j.teams.home.name)}</div>
                    <div class="score">${j.goals.home ?? 0} - ${j.goals.away ?? 0}</div>
                    <div class="time"><img src="${j.teams.away.logo}">${traduzir(j.teams.away.name)}</div>
                </div>
                <div class="status-box ${vivo ? 'ao-vivo' : ''}">
                    ${vivo ? '🔴 AO VIVO - ' + j.fixture.status.elapsed + "'" : j.fixture.status.long}
                </div>
            `;
            lista.appendChild(card);
        });
    }

    function trocarAba(m) {
        document.getElementById("btnHoje").classList.toggle("active", m === 'hoje');
        document.getElementById("btnAoVivo").classList.toggle("active", m === 'ao-vivo');
        carregar(m);
    }

    window.onload = () => carregar('hoje');
</script>
</body>
</html>
